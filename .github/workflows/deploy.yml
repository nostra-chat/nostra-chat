name: Deploy Nostra.chat

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect docs-only PR
        id: detect
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          CODE=$(echo "$CHANGED" | grep -vE '(\.md$|^docs/|^LICENSE$)' || true)
          if [ -z "$CODE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Docs-only PR — skipping build steps"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.skip != 'true'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.detect.outputs.skip != 'true'
        run: pnpm build

      - uses: actions/upload-artifact@v4
        if: steps.detect.outputs.skip != 'true'
        with:
          name: dist
          path: dist/

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nostra-chat
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-ipfs:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: ipshipyard/ipfs-deploy-action@v1
        with:
          path-to-deploy: dist
          filebase-access-key: ${{ secrets.FILEBASE_ACCESS_KEY }}
          filebase-secret-key: ${{ secrets.FILEBASE_SECRET_KEY }}
          filebase-bucket: ${{ secrets.FILEBASE_BUCKET }}
          github-token: ${{ github.token }}
