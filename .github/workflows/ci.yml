name: Pull request verification

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Prepare local-only files
        run: cp src/langPackLocalVersion.example.ts src/langPackLocalVersion.ts

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Explorer browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Critical Nostra tests
        run: pnpm test:nostra:quick

      - name: Explorer tests
        run: pnpm test:explorer

      - name: Full deterministic Nostra suite
        run: pnpm test:nostra

      - name: Production build and manifest validation
        run: pnpm build
